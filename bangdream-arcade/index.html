<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BanG Dream! Arcade Shooter</title>
  <link rel="stylesheet" href="./css/game.css"/>
</head>
<body>
  <main class="wrap">
    <header class="bar">
      <div class="stats">
        <span>分数 <b id="score">0</b></span>
        <span>生命 <b id="hp">5</b></span>
        <span>叠加 <b id="stack">0/5</b></span>
        <span>剩余 <b id="buff">0.0s</b></span>
        <span>友希那技 <b id="yukina">0%</b></span>
        <span>难度 <b id="difficultyText">普通</b></span>
        <span>最高分 <b id="best">0</b></span>
      </div>
      <div style="display:flex;gap:8px">
      <button id="pauseBtn" class="btn">暂停(P)</button>
      <button id="restart" class="btn danger">重开</button>
    </div>
    </header>

    <section id="game"></section>

    <section id="menu" class="menu">
      <div class="menu-card">
        <h2>BanG Dream! Arcade</h2>
        <p>选择难度后开始游戏</p>
        <div class="menu-row">
          <button class="btn" data-diff="normal">普通</button>
          <button class="btn" data-diff="hard">困难</button>
          <button class="btn" data-diff="hell">地狱</button>
        </div>
        <button id="startBtn" class="btn danger">开始游戏</button>
      </div>
    </section>

    <section id="pauseMenu" class="menu hidden">
      <div class="menu-card">
        <h2>已暂停</h2>
        <div class="menu-row" style="flex-direction:column;align-items:stretch">
          <button id="resumeBtn" class="btn">继续</button>
          <button id="restartBtn2" class="btn">重开本局</button>
          <button id="backMenuBtn" class="btn danger">返回主菜单</button>
        </div>
      </div>
    </section>

    <footer class="controls">
      <button class="btn" id="left">←</button>
      <button class="btn" id="right">→</button>
      <button class="btn" id="up">↑</button>
      <button class="btn" id="down">↓</button>
      <button class="btn" id="fire">开火</button>
      <button class="btn" id="yukinaBtn">友希那技(K)</button>
    </footer>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
