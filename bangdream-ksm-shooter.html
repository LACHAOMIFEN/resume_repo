<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KSM 打飞机 · BanG Dream</title>
  <style>
    :root{
      --bg:#0a0e1f;
      --panel:#1a2245;
      --text:#eef2ff;
      --muted:#aab5ea;
      --accent:#ff79c8;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at 20% 0%,#2a3374 0%,var(--bg) 45%);
      color:var(--text);
      font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:16px;
    }
    .wrap{
      width:min(920px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.16);
      border-radius:16px;
      padding:12px;
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .stats{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
    .badge{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
    }
    button{
      border:0;
      border-radius:10px;
      padding:9px 14px;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:#2b0120;
    }
    #game{
      width:100%;
      aspect-ratio:16/9;
      background:linear-gradient(180deg,#0c1230,#060912);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.15);
      display:block;
    }
    .tip{color:var(--muted);margin-top:8px;font-size:13px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="stats">
        <span class="badge">分数：<b id="score">0</b></span>
        <span class="badge">生命：<b id="hp">5</b></span>
        <span class="badge">模式：<b id="mode">普通子弹</b></span>
      </div>
      <button id="restart">重新开始</button>
    </div>

    <canvas id="game" width="960" height="540"></canvas>
    <div class="tip">操作：←/→/A/D 移动，空格射击。掉落物：🎸 KSM 电吉他、🥖 Saya 面包。吃到后子弹会变异（自由发挥版）。</div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hpEl = document.getElementById('hp');
    const modeEl = document.getElementById('mode');
    const restartBtn = document.getElementById('restart');

    const W = canvas.width, H = canvas.height;
    const keys = new Set();

    const imgCache = new Map();
    function loadImage(src){
      if (imgCache.has(src)) return imgCache.get(src);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = src;
      imgCache.set(src,img);
      return img;
    }

    const ksmSrc = 'https://bestdori.com/res/icon/chara_icon_1.png';
    const enemyPool = Array.from({length:39},(_,i)=>`https://bestdori.com/res/icon/chara_icon_${i+2}.png`);

    let game;
    function resetGame(){
      game = {
        score:0,
        hp:5,
        over:false,
        t:0,
        spawnTimer:0,
        dropTimer:0,
        shootCd:0,
        player:{x:W/2,y:H-80,r:28,speed:340,img:loadImage(ksmSrc)},
        enemies:[],
        bullets:[],
        enemyBullets:[],
        drops:[],
        fx:[],
        power:{type:'normal',until:0},
      };
      updateHUD();
    }

    function updateHUD(){
      scoreEl.textContent = game.score;
      hpEl.textContent = game.hp;
      const map = {
        normal:'普通子弹',
        guitar:'🎸 吉他模式',
        bread:'🥖 面包模式',
        chaos:'💥 混沌模式',
      };
      modeEl.textContent = map[game.power.type] || '普通子弹';
    }

    function rand(a,b){return Math.random()*(b-a)+a}
    function pick(arr){return arr[(Math.random()*arr.length)|0]}

    function spawnEnemy(){
      const r = rand(20,30);
      game.enemies.push({
        x:rand(r,W-r),
        y:-40,
        r,
        hp:2,
        vy:rand(50,120),
        vx:rand(-30,30),
        img:loadImage(pick(enemyPool)),
        fireCd:rand(0.8,2.4),
      });
    }

    function spawnDrop(x,y){
      const kind = Math.random() < 0.5 ? 'guitar' : 'bread';
      game.drops.push({x,y,r:16,vy:90,kind,spin:rand(0,6.28)});
    }

    function shoot(){
      if(game.shootCd>0||game.over) return;
      game.shootCd = 0.16;
      const p = game.player;
      const kind = game.power.type;

      if(kind==='normal'){
        game.bullets.push({x:p.x,y:p.y-26,vx:0,vy:-460,r:5,shape:'dot',life:2,color:'#ffe97d',dmg:1});
      }else if(kind==='guitar'){
        for(let i=-1;i<=1;i++){
          game.bullets.push({x:p.x+i*12,y:p.y-24,vx:i*70,vy:-430,r:8,shape:'diamond',life:2,color:'#ffb4ff',dmg:1});
        }
      }else if(kind==='bread'){
        game.bullets.push({x:p.x,y:p.y-24,vx:0,vy:-380,r:11,shape:'baguette',life:2,color:'#ffde9b',dmg:2,spin:rand(0,6.28)});
      }else{
        for(let i=0;i<7;i++){
          const a = (Math.PI*2/7)*i + game.t*2;
          game.bullets.push({x:p.x,y:p.y-20,vx:Math.cos(a)*170,vy:-280+Math.sin(a)*120,r:6,shape:'star',life:1.3,color:`hsl(${(game.t*200+i*40)%360} 90% 65%)`,dmg:1});
        }
      }
    }

    function applyDrop(kind){
      // 10 秒强化；连续吃到时有几率进入 chaos
      const now = performance.now()/1000;
      if(game.power.type!== 'normal' && Math.random() < 0.35){
        game.power.type = 'chaos';
        game.power.until = now + 8;
      }else{
        game.power.type = kind;
        game.power.until = now + 10;
      }
      updateHUD();
    }

    function circleHit(a,b){
      const dx=a.x-b.x, dy=a.y-b.y;
      const rr=(a.r||0)+(b.r||0);
      return dx*dx+dy*dy<=rr*rr;
    }

    function damagePlayer(){
      game.hp -= 1;
      game.fx.push({x:game.player.x,y:game.player.y,r:10,life:.35,color:'#ff6060'});
      if(game.hp<=0) game.over=true;
      updateHUD();
    }

    function update(dt){
      game.t += dt;
      const now = performance.now()/1000;

      if(game.power.type!=='normal' && now>game.power.until){
        game.power.type='normal';
        updateHUD();
      }

      const p = game.player;
      if(keys.has('ArrowLeft')||keys.has('a')||keys.has('A')) p.x -= p.speed*dt;
      if(keys.has('ArrowRight')||keys.has('d')||keys.has('D')) p.x += p.speed*dt;
      p.x = Math.max(p.r,Math.min(W-p.r,p.x));

      if(keys.has(' ')||keys.has('Space')) shoot();
      game.shootCd = Math.max(0, game.shootCd-dt);

      game.spawnTimer -= dt;
      if(game.spawnTimer<=0){
        spawnEnemy();
        game.spawnTimer = Math.max(0.28, 1.05 - game.score*0.003);
      }

      for(const e of game.enemies){
        e.x += e.vx*dt;
        e.y += e.vy*dt;
        if(e.x<e.r||e.x>W-e.r) e.vx*=-1;
        e.fireCd -= dt;
        if(e.fireCd<=0){
          e.fireCd = rand(1.2,2.2);
          const dx = p.x - e.x, dy = p.y - e.y;
          const len = Math.hypot(dx,dy)||1;
          game.enemyBullets.push({x:e.x,y:e.y,vx:dx/len*180,vy:dy/len*180,r:6,life:5});
        }
      }

      for(const b of game.bullets){
        b.x += b.vx*dt;
        b.y += b.vy*dt;
        b.life -= dt;
        if(b.shape==='baguette') b.spin = (b.spin||0)+dt*8;
      }
      for(const b of game.enemyBullets){
        b.x += b.vx*dt;
        b.y += b.vy*dt;
        b.life -= dt;
      }

      for(const d of game.drops){
        d.y += d.vy*dt;
        d.spin += dt*2;
      }

      // bullet-enemy collision
      for(const b of game.bullets){
        for(const e of game.enemies){
          if(e.hp>0 && circleHit(b,e)){
            e.hp -= b.dmg||1;
            b.life = 0;
            game.fx.push({x:e.x,y:e.y,r:8,life:.22,color:b.color||'#fff'});
            if(e.hp<=0){
              game.score += 10;
              if(Math.random()<0.28) spawnDrop(e.x,e.y);
              updateHUD();
            }
          }
        }
      }

      // enemy bullet / enemy collision with player
      for(const eb of game.enemyBullets){
        if(circleHit(eb,p)){ eb.life=0; damagePlayer(); }
      }
      for(const e of game.enemies){
        if(e.hp>0 && circleHit(e,p)){ e.hp=0; damagePlayer(); }
      }

      // drops pickup
      for(const d of game.drops){
        if(circleHit(d,p)){ d.dead=true; applyDrop(d.kind); }
      }

      // cleanup
      game.enemies = game.enemies.filter(e=>e.hp>0&&e.y<H+60);
      game.bullets = game.bullets.filter(b=>b.life>0&&b.y>-80&&b.y<H+80&&b.x>-80&&b.x<W+80);
      game.enemyBullets = game.enemyBullets.filter(b=>b.life>0&&b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);
      game.drops = game.drops.filter(d=>!d.dead&&d.y<H+30);
      game.fx = game.fx.filter(f=> (f.life-=dt)>0);
    }

    function drawAvatarCircle(img,x,y,r){
      ctx.save();
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      if(img && img.complete){
        ctx.drawImage(img,x-r,y-r,r*2,r*2);
      }else{
        ctx.fillStyle='#8ea1ff';
        ctx.fillRect(x-r,y-r,r*2,r*2);
      }
      ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,.7)';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
    }

    function drawBullet(b){
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.fillStyle = b.color || '#fff';
      if(b.shape==='dot'){
        ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();
      }else if(b.shape==='diamond'){
        ctx.rotate(game.t*8);
        ctx.beginPath();
        ctx.moveTo(0,-b.r*1.2);ctx.lineTo(b.r,0);ctx.lineTo(0,b.r*1.2);ctx.lineTo(-b.r,0);ctx.closePath();ctx.fill();
      }else if(b.shape==='baguette'){
        ctx.rotate(b.spin||0);
        ctx.beginPath();
        ctx.roundRect(-b.r*1.7,-b.r*.55,b.r*3.4,b.r*1.1,6);
        ctx.fill();
        ctx.strokeStyle='rgba(120,70,20,.55)';
        ctx.lineWidth=1.6;
        for(let i=-1;i<=1;i++){
          ctx.beginPath();ctx.moveTo(i*7,-5);ctx.lineTo(i*9,5);ctx.stroke();
        }
      }else if(b.shape==='star'){
        ctx.rotate(game.t*9);
        ctx.beginPath();
        for(let i=0;i<10;i++){
          const a = i*Math.PI/5;
          const rr = i%2?b.r*.5:b.r*1.2;
          ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
        }
        ctx.closePath();ctx.fill();
      }
      ctx.restore();
    }

    function draw(){
      ctx.clearRect(0,0,W,H);

      // starfield
      for(let i=0;i<70;i++){
        const x = (i*131 + game.t*80*(i%3+1)) % W;
        const y = (i*67 + game.t*40*(i%5+1)) % H;
        ctx.fillStyle = `rgba(255,255,255,${0.14 + (i%5)*0.06})`;
        ctx.fillRect(x,y,2,2);
      }

      // player
      drawAvatarCircle(game.player.img,game.player.x,game.player.y,game.player.r);

      // enemies
      for(const e of game.enemies){
        drawAvatarCircle(e.img,e.x,e.y,e.r);
      }

      // bullets
      for(const b of game.bullets) drawBullet(b);

      ctx.fillStyle = '#ff7474';
      for(const b of game.enemyBullets){
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      }

      // drops
      for(const d of game.drops){
        ctx.save();
        ctx.translate(d.x,d.y);
        ctx.rotate(d.spin);
        ctx.font='24px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(d.kind==='guitar'?'🎸':'🥖',0,0);
        ctx.restore();
      }

      // fx
      for(const f of game.fx){
        ctx.strokeStyle = f.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = Math.max(0,f.life*2.5);
        ctx.beginPath();ctx.arc(f.x,f.y,f.r*(1+(1-f.life)*2),0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha = 1;
      }

      if(game.over){
        ctx.fillStyle='rgba(0,0,0,.55)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#fff';
        ctx.textAlign='center';
        ctx.font='bold 58px sans-serif';
        ctx.fillText('GAME OVER',W/2,H/2-16);
        ctx.font='28px sans-serif';
        ctx.fillText(`Score: ${game.score}`,W/2,H/2+34);
      }
    }

    let last = performance.now();
    function loop(now){
      const dt = Math.min(0.033,(now-last)/1000);
      last = now;
      if(!game.over) update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown',(e)=>{
      if(['ArrowLeft','ArrowRight',' ','a','A','d','D'].includes(e.key)) e.preventDefault();
      keys.add(e.key === 'Spacebar' ? ' ' : e.key);
    });
    window.addEventListener('keyup',(e)=>{
      keys.delete(e.key === 'Spacebar' ? ' ' : e.key);
    });

    restartBtn.addEventListener('click',()=>resetGame());

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
