<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KSM 打飞机 · BanG Dream</title>
  <style>
    :root{--bg:#0a0e1f;--text:#eef2ff;--muted:#aab5ea;--accent:#ff79c8}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0%,#2a3374 0%,var(--bg) 45%);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:16px}
    .wrap{width:min(920px,100%);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:12px;box-shadow:0 14px 40px rgba(0,0,0,.35)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .stats{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
    .badge{padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08)}
    button{border:0;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer;background:var(--accent);color:#2b0120}
    #game{width:100%;aspect-ratio:16/9;background:linear-gradient(180deg,#0c1230,#060912);border-radius:12px;border:1px solid rgba(255,255,255,.15);display:block}
    .tip{color:var(--muted);margin-top:8px;font-size:13px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="stats">
        <span class="badge">分数：<b id="score">0</b></span>
        <span class="badge">生命：<b id="hp">5</b></span>
        <span class="badge">火力：<b id="mode">普通</b></span>
        <span class="badge">必杀槽：<b id="ult">0%</b></span>
      </div>
      <button id="restart">重新开始</button>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="tip">操作：←/→/A/D 移动，空格射击，J 放必杀。掉落：🎸 电吉他、🥖 面包（让子弹变异）。每 200 分出现头像 Boss。</div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const scoreEl = document.getElementById('score');
    const hpEl = document.getElementById('hp');
    const modeEl = document.getElementById('mode');
    const ultEl = document.getElementById('ult');
    const restartBtn = document.getElementById('restart');

    const keys = new Set();
    const imgCache = new Map();
    const ksm = 'https://bestdori.com/res/icon/chara_icon_1.png';
    const enemyPool = Array.from({length:39},(_,i)=>`https://bestdori.com/res/icon/chara_icon_${i+2}.png`);

    const loadImage = (src)=>{ if(imgCache.has(src)) return imgCache.get(src); const i=new Image(); i.crossOrigin='anonymous'; i.src=src; imgCache.set(src,i); return i; };
    const rand = (a,b)=>Math.random()*(b-a)+a;
    const pick = (arr)=>arr[(Math.random()*arr.length)|0];

    let game;
    function init(){
      game = {
        t:0, score:0, hp:5, over:false,
        spawn:0, shootCd:0,
        player:{x:W/2,y:H-80,r:28,speed:360,img:loadImage(ksm)},
        enemies:[], enemyBullets:[], bullets:[], drops:[], fx:[],
        power:{type:'normal',until:0},
        ult:0, // 0~100
        boss:null,
        nextBossAt:200
      };
      hud();
    }

    function hud(){
      scoreEl.textContent = game.score;
      hpEl.textContent = game.hp;
      ultEl.textContent = Math.min(100,Math.floor(game.ult)) + '%';
      modeEl.textContent = ({normal:'普通',guitar:'吉他弹',bread:'面包弹',chaos:'混沌弹'})[game.power.type];
    }

    function spawnEnemy(){
      const r = rand(18,26);
      game.enemies.push({x:rand(r,W-r),y:-30,r,hp:2,vx:rand(-50,50),vy:rand(70,130),img:loadImage(pick(enemyPool)),fire:rand(1,2.2)});
    }

    function spawnBoss(){
      game.boss = {x:W/2,y:88,r:62,hp:90,maxHp:90,vx:120,img:loadImage(pick(enemyPool)),fire:0.55};
      game.fx.push({x:W/2,y:130,r:18,life:.8,color:'#ff82c9'});
    }

    function dropAt(x,y){ game.drops.push({x,y,r:16,vy:100,kind:Math.random()<.5?'guitar':'bread',spin:rand(0,6.28)}); }

    function shoot(){
      if(game.shootCd>0||game.over) return;
      game.shootCd = 0.14;
      const p = game.player;
      const type = game.power.type;
      if(type==='normal') game.bullets.push({x:p.x,y:p.y-26,vx:0,vy:-520,r:5,shape:'dot',dmg:1,life:2,color:'#ffe47a'});
      else if(type==='guitar') for(let i=-1;i<=1;i++) game.bullets.push({x:p.x+i*12,y:p.y-24,vx:i*80,vy:-470,r:8,shape:'diamond',dmg:1,life:2,color:'#ffb4ff'});
      else if(type==='bread') game.bullets.push({x:p.x,y:p.y-24,vx:0,vy:-390,r:12,shape:'baguette',dmg:3,life:2,color:'#ffdd95',spin:rand(0,6.28)});
      else for(let i=0;i<8;i++){ const a=i*Math.PI/4+game.t*1.5; game.bullets.push({x:p.x,y:p.y-18,vx:Math.cos(a)*180,vy:-250+Math.sin(a)*130,r:6,shape:'star',dmg:1,life:1.35,color:`hsl(${(game.t*190+i*35)%360} 92% 65%)`}); }
    }

    function useUlt(){
      if(game.ult<100||game.over) return;
      game.ult = 0;
      // 全屏清弹 + 重创敌人
      game.enemyBullets = [];
      for(const e of game.enemies) e.hp = 0;
      if(game.boss) game.boss.hp -= 35;
      game.fx.push({x:W/2,y:H/2,r:30,life:.9,color:'#8fd2ff',big:true});
      game.score += 30;
      hud();
    }

    function hit(a,b){ const dx=a.x-b.x,dy=a.y-b.y,rr=(a.r||0)+(b.r||0); return dx*dx+dy*dy<=rr*rr; }

    function damage(){
      game.hp--;
      game.fx.push({x:game.player.x,y:game.player.y,r:10,life:.35,color:'#ff6f6f'});
      if(game.hp<=0) game.over=true;
      hud();
    }

    function applyDrop(kind){
      const now = performance.now()/1000;
      if(game.power.type!=='normal'&&Math.random()<0.35){ game.power.type='chaos'; game.power.until=now+8; }
      else { game.power.type=kind; game.power.until=now+10; }
      game.ult = Math.min(100, game.ult + 18);
      hud();
    }

    function update(dt){
      game.t += dt;
      const now = performance.now()/1000;
      if(game.power.type!=='normal'&&now>game.power.until){ game.power.type='normal'; hud(); }

      const p = game.player;
      if(keys.has('ArrowLeft')||keys.has('a')||keys.has('A')) p.x-=p.speed*dt;
      if(keys.has('ArrowRight')||keys.has('d')||keys.has('D')) p.x+=p.speed*dt;
      p.x = Math.max(p.r,Math.min(W-p.r,p.x));

      if(keys.has(' ')||keys.has('Space')) shoot();
      game.shootCd=Math.max(0,game.shootCd-dt);

      if(!game.boss){
        game.spawn -= dt;
        if(game.spawn<=0){ spawnEnemy(); game.spawn=Math.max(.26, .95-game.score*0.0025); }
      }

      if(!game.boss && game.score>=game.nextBossAt){ spawnBoss(); game.nextBossAt += 220; }

      for(const e of game.enemies){
        e.x += e.vx*dt; e.y += e.vy*dt;
        if(e.x<e.r||e.x>W-e.r) e.vx*=-1;
        e.fire -= dt;
        if(e.fire<=0){ e.fire=rand(1.1,2.2); const dx=p.x-e.x,dy=p.y-e.y,l=Math.hypot(dx,dy)||1; game.enemyBullets.push({x:e.x,y:e.y,vx:dx/l*200,vy:dy/l*200,r:5,life:5}); }
      }

      if(game.boss){
        const b=game.boss;
        b.x += b.vx*dt;
        if(b.x<b.r||b.x>W-b.r) b.vx*=-1;
        b.fire -= dt;
        if(b.fire<=0){
          b.fire=0.45;
          for(let i=-2;i<=2;i++) game.enemyBullets.push({x:b.x+i*16,y:b.y+28,vx:i*40,vy:230,r:6,life:5});
        }
        if(b.hp<=0){
          game.score += 120;
          game.ult = Math.min(100, game.ult + 45);
          for(let i=0;i<4;i++) dropAt(b.x+rand(-40,40),b.y+rand(-10,20));
          game.fx.push({x:b.x,y:b.y,r:24,life:1,color:'#ffd36b'});
          game.boss = null;
          hud();
        }
      }

      for(const b of game.bullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; if(b.shape==='baguette') b.spin=(b.spin||0)+dt*8; }
      for(const b of game.enemyBullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; }
      for(const d of game.drops){ d.y+=d.vy*dt; d.spin+=dt*2; }

      for(const b of game.bullets){
        for(const e of game.enemies) if(e.hp>0&&hit(b,e)){ e.hp-=b.dmg||1; b.life=0; if(e.hp<=0){ game.score+=10; if(Math.random()<.3) dropAt(e.x,e.y); game.ult=Math.min(100,game.ult+2); } }
        if(game.boss&&hit(b,game.boss)){ game.boss.hp-=b.dmg||1; b.life=0; game.ult=Math.min(100,game.ult+.5); }
      }

      for(const eb of game.enemyBullets) if(hit(eb,p)){ eb.life=0; damage(); }
      for(const e of game.enemies) if(e.hp>0&&hit(e,p)){ e.hp=0; damage(); }
      if(game.boss&&hit(game.boss,p)) damage();

      for(const d of game.drops) if(hit(d,p)){ d.dead=true; applyDrop(d.kind); }

      game.enemies=game.enemies.filter(e=>e.hp>0&&e.y<H+40);
      game.bullets=game.bullets.filter(b=>b.life>0&&b.x>-80&&b.x<W+80&&b.y>-80&&b.y<H+80);
      game.enemyBullets=game.enemyBullets.filter(b=>b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);
      game.drops=game.drops.filter(d=>!d.dead&&d.y<H+30);
      game.fx=game.fx.filter(f=>(f.life-=dt)>0);
      hud();
    }

    function planeBody(x,y,scale,color){
      ctx.save();
      ctx.translate(x,y);
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(0,-30*scale); ctx.lineTo(16*scale,24*scale); ctx.lineTo(0,14*scale); ctx.lineTo(-16*scale,24*scale); ctx.closePath();
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.fillRect(-3*scale,-10*scale,6*scale,24*scale);
      ctx.restore();
    }

    function avatar(img,x,y,r){
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
      if(img&&img.complete) ctx.drawImage(img,x-r,y-r,r*2,r*2); else { ctx.fillStyle='#8ea1ff'; ctx.fillRect(x-r,y-r,r*2,r*2); }
      ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    }

    function drawBullet(b){
      ctx.save(); ctx.translate(b.x,b.y); ctx.fillStyle=b.color||'#fff';
      if(b.shape==='dot'){ ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill(); }
      else if(b.shape==='diamond'){ ctx.rotate(game.t*8); ctx.beginPath(); ctx.moveTo(0,-b.r*1.25); ctx.lineTo(b.r,0); ctx.lineTo(0,b.r*1.25); ctx.lineTo(-b.r,0); ctx.closePath(); ctx.fill(); }
      else if(b.shape==='baguette'){ ctx.rotate(b.spin||0); ctx.beginPath(); ctx.ellipse(0,0,b.r*1.7,b.r*.6,0,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(120,70,20,.55)'; ctx.lineWidth=1.5; for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*7,-4); ctx.lineTo(i*9,4); ctx.stroke(); } }
      else { ctx.rotate(game.t*9); ctx.beginPath(); for(let i=0;i<10;i++){ const a=i*Math.PI/5, rr=i%2?b.r*.5:b.r*1.25; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }
      ctx.restore();
    }

    function drawBossBar(){
      if(!game.boss) return;
      const b=game.boss;
      const w=340,h=12,x=(W-w)/2,y=12;
      ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#ff7fbf'; ctx.fillRect(x,y,w*(b.hp/b.maxHp),h);
      ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.strokeRect(x,y,w,h);
      ctx.fillStyle='#ffd9ee'; ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.fillText('BOSS',W/2,y-4);
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      for(let i=0;i<80;i++){ const x=(i*137+game.t*70*(i%3+1))%W, y=(i*79+game.t*36*(i%5+1))%H; ctx.fillStyle=`rgba(255,255,255,${0.12+(i%5)*0.05})`; ctx.fillRect(x,y,2,2); }

      // Player plane visible body + KSM cockpit
      planeBody(game.player.x,game.player.y,1.2,'#ff74c6');
      avatar(game.player.img,game.player.x,game.player.y-4,14);

      for(const e of game.enemies){ planeBody(e.x,e.y,.95,'#6f88ff'); avatar(e.img,e.x,e.y-3,11); }
      if(game.boss){ planeBody(game.boss.x,game.boss.y,2.2,'#b56cff'); avatar(game.boss.img,game.boss.x,game.boss.y-6,26); drawBossBar(); }

      for(const b of game.bullets) drawBullet(b);
      ctx.fillStyle='#ff6f6f'; for(const b of game.enemyBullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); }

      for(const d of game.drops){ ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.spin); ctx.font='24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(d.kind==='guitar'?'🎸':'🥖',0,0); ctx.restore(); }

      for(const f of game.fx){ ctx.globalAlpha=Math.max(0,f.life*2); ctx.strokeStyle=f.color; ctx.lineWidth=f.big?8:3; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1+(1-f.life)*2.4),0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }

      if(game.over){
        ctx.fillStyle='rgba(0,0,0,.56)'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 56px sans-serif'; ctx.fillText('GAME OVER',W/2,H/2-14);
        ctx.font='28px sans-serif'; ctx.fillText(`Score: ${game.score}`,W/2,H/2+34);
      }
    }

    let last=performance.now();
    function loop(now){ const dt=Math.min(0.033,(now-last)/1000); last=now; if(!game.over) update(dt); draw(); requestAnimationFrame(loop); }

    window.addEventListener('keydown',e=>{ if(['ArrowLeft','ArrowRight',' ','a','A','d','D','j','J'].includes(e.key)) e.preventDefault(); keys.add(e.key==='Spacebar'?' ':e.key); if(e.key==='j'||e.key==='J') useUlt(); });
    window.addEventListener('keyup',e=>keys.delete(e.key==='Spacebar'?' ':e.key));
    restartBtn.addEventListener('click',init);

    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
