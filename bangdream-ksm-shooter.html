<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KSM 打飞机（DOM 兼容版）</title>
  <style>
    body{margin:0;background:#0d1126;color:#eef;font-family:system-ui,"PingFang SC";display:grid;place-items:center;min-height:100vh;padding:12px}
    .wrap{width:min(900px,100%);background:#1a2145;border:1px solid #ffffff22;border-radius:12px;padding:10px}
    .bar{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .stats{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:#b8c2ff}
    .stats span{background:#ffffff14;border:1px solid #ffffff24;border-radius:999px;padding:6px 10px}
    .btn{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;background:#7ea8ff;color:#071225}
    #restart{background:#ff7ac6;color:#260018}
    #game{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:12px;border:1px solid #ffffff24;
      background:
      linear-gradient(rgba(4,6,14,.72), rgba(4,6,14,.78)),
      url('https://static.wikia.nocookie.net/bandori/images/1/14/MyGO%21%21%21%21%21.jpeg/revision/latest?cb=20230527094206') center/cover no-repeat,
      radial-gradient(circle at 20% 10%, #233a7a 0%, #121a3e 40%, #090d19 100%);
    }
    #game::before{content:'';position:absolute;inset:0;pointer-events:none;
      background:
        linear-gradient(transparent 96%, rgba(255,255,255,.05) 96%),
        linear-gradient(90deg, transparent 96%, rgba(255,255,255,.04) 96%),
        repeating-linear-gradient(180deg, rgba(255,255,255,.025) 0 2px, transparent 2px 6px);
      background-size:16px 16px,16px 16px,auto;
      mix-blend-mode: screen;opacity:.32;
    }
    .obj{position:absolute;transform:translate(-50%,-50%);user-select:none;pointer-events:none}
    .player{width:54px;height:54px;border:2px solid #fff;border-radius:12px;background:#ff4fb8cc;display:grid;place-items:center}
    .player img{width:34px;height:34px;border-radius:999px;object-fit:cover}
    .enemy{width:40px;height:40px;border-radius:10px;background:#6f88ffcc;border:1px solid #fff8;display:grid;place-items:center}
    .enemy img{width:26px;height:26px;border-radius:999px;object-fit:cover}
    .bullet{width:8px;height:14px;background:#ffe46f;border-radius:999px}
    .eb{width:10px;height:10px;background:#ff7070;border-radius:999px}
    .drop{font-size:20px}
    .skillfx{font-size:26px;color:#ffd6f5;text-shadow:0 0 10px #ff66cc;animation:burst .7s ease-out forwards}
    .yukina-flash{width:280px;height:280px;border-radius:16px;object-fit:cover;border:2px solid #ffffffaa;box-shadow:0 0 28px #ff7ad8;animation:yflash .55s ease-out forwards}
    @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-180%) scale(1.35)}}
    @keyframes yflash{0%{opacity:0;transform:translate(-50%,-50%) scale(.86)}22%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}
    .controls{display:flex;gap:8px;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="stats">
      <span>分数 <b id="score">0</b></span>
      <span>生命 <b id="hp">5</b></span>
      <span>X <b id="px">0</b></span>
      <span>模式 <b id="mode">普通</b></span>
      <span>道具剩余 <b id="buff">0.0s</b></span>
      <span>友希那技 <b id="yukina">0%</b></span>
    </div>
    <button id="restart" class="btn">重开</button>
  </div>
  <div id="game"></div>
  <div class="controls">
    <button class="btn" id="left">← 左移</button>
    <button class="btn" id="right">右移 →</button>
    <button class="btn" id="up">↑ 上移</button>
    <button class="btn" id="down">↓ 下移</button>
    <button class="btn" id="fire">开火</button>
    <button class="btn" id="yukinaBtn">友希那技(K)</button>
  </div>
</div>
<script>
(()=>{
  const game=document.getElementById('game');
  const scoreEl=document.getElementById('score');
  const hpEl=document.getElementById('hp');
  const pxEl=document.getElementById('px');
  const modeEl=document.getElementById('mode');
  const buffEl=document.getElementById('buff');
  const yukinaEl=document.getElementById('yukina');
  const yukinaBtn=document.getElementById('yukinaBtn');
  const W=960,H=540;
  const sx=()=>game.clientWidth/W, sy=()=>game.clientHeight/H;
  const ksm='https://bestdori.com/res/icon/chara_icon_1.png';
  const pool=Array.from({length:39},(_,i)=>`https://bestdori.com/res/icon/chara_icon_${i+2}.png`);
  const YUKINA_FLASH_IMG='https://static.wikia.nocookie.net/bandori/images/5/5e/Minato_Yukina_-_Summer_Uniform_Live2D.png/revision/latest?cb=20230823090436';
  // 你可以放一个本地/网络语音链接到这里（例如 ./assets/ksm-voice.mp3）
  const KSM_VOICE_URL='';

  let g,keys=new Set(),holdL=false,holdR=false,holdU=false,holdD=false,autoFire=true;
  let audioCtx=null,bgmStarted=false,bgmTimer=null,bgmStep=0;

  const mk=(cls,html='')=>{const d=document.createElement('div');d.className='obj '+cls;d.innerHTML=html;game.appendChild(d);return d};
  const place=(el,x,y)=>{el.style.left=(x*sx())+'px';el.style.top=(y*sy())+'px';};

  function init(){
    game.innerHTML='';
    const pEl=mk('player',`<img src="${ksm}">`);
    g={score:0,hp:5,mode:'普通',buffType:null,buffUntil:0,shield:0,yukina:0,player:{x:W/2,y:H-70,el:pEl},bul:[],eb:[],en:[],drop:[],t:0,spawn:0,shoot:0,over:false};
    hud();
  }

  function hud(){scoreEl.textContent=g.score;hpEl.textContent=g.hp;pxEl.textContent=Math.round(g.player.x);modeEl.textContent=g.mode+(g.shield>0?`(盾${g.shield})`:'' );const left=Math.max(0,g.buffUntil-g.t);buffEl.textContent=left.toFixed(1)+'s';yukinaEl.textContent=Math.min(100,Math.floor(g.yukina))+'%';}

  function addEnemy(){
    const el=mk('enemy',`<img src="${pool[(Math.random()*pool.length)|0]}">`);
    g.en.push({x:40+Math.random()*(W-80),y:-30,vx:(Math.random()*100-50),vy:80+Math.random()*60,hp:2,el,fire:0.8+Math.random()*1.2});
  }
  function addBullet(){
    const active = g.t < g.buffUntil ? g.buffType : null;
    if(active==='guitar'){
      for(const dx of [-16,0,16]){
        const el=mk('bullet');
        el.style.background = dx===0 ? '#7dffcf' : '#ffb7ff';
        el.style.width = dx===0 ? '12px' : '8px';
        el.style.height = dx===0 ? '18px' : '14px';
        g.bul.push({x:g.player.x+dx,y:g.player.y-28,vx:dx*3,vy:-560,el,dmg:1,pierce:0,homing:false});
      }
    }else if(active==='keyboard'){
      const el=mk('bullet');
      el.style.background='#8ff'; el.style.width='18px'; el.style.height='26px';
      g.bul.push({x:g.player.x,y:g.player.y-30,vx:0,vy:-700,el,dmg:2,pierce:3,homing:false});
    }else if(active==='drum'){
      const el=mk('bullet');
      el.style.background='#ffd27f'; el.style.width='14px'; el.style.height='14px';
      g.bul.push({x:g.player.x,y:g.player.y-28,vx:0,vy:-520,el,dmg:2,pierce:0,homing:false});
    }else if(active==='bass'){
      for(const dx of [-8,8]){
        const el=mk('bullet');
        el.style.background='#b0ff8f'; el.style.width='10px'; el.style.height='16px';
        g.bul.push({x:g.player.x+dx,y:g.player.y-28,vx:dx*2,vy:-560,el,dmg:1,pierce:0,homing:false});
      }
    }else if(active==='violin'){
      const el=mk('bullet');
      el.style.background='#ff9fd6'; el.style.width='10px'; el.style.height='18px';
      g.bul.push({x:g.player.x,y:g.player.y-28,vx:0,vy:-480,el,dmg:1,pierce:0,homing:true});
    }else{
      const el=mk('bullet');
      g.bul.push({x:g.player.x,y:g.player.y-28,vx:0,vy:-500,el,dmg:1,pierce:0,homing:false});
    }
  }
  function addEB(x,y,vx,vy){const el=mk('eb');g.eb.push({x,y,vx,vy,el});}
  function addDrop(x,y){
    const pool=['guitar','keyboard','drum','bass','violin'];
    const kind=pool[(Math.random()*pool.length)|0];
    const icon={guitar:'🎸',keyboard:'🎹',drum:'🥁',bass:'🪕',violin:'🎻'}[kind];
    const el=mk('drop',icon);
    g.drop.push({x,y,vy:90,el,kind});
  }

  function hit(a,b,ra=18,rb=18){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy<=(ra+rb)*(ra+rb)}

  function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }

  function beep(freq=440,len=0.12,type='square',vol=0.03,when=0){
    try{
      ensureAudio();
      const t=audioCtx.currentTime+when;
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type=type; o.frequency.value=freq;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(vol,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+len);
      o.start(t); o.stop(t+len+0.01);
    }catch(e){}
  }

  function startBgm(){
    if(bgmStarted) return;
    bgmStarted=true;
    ensureAudio();
    const melody=[523.25,659.25,783.99,659.25,587.33,659.25,493.88,392.00];
    const bass=[130.81,130.81,146.83,130.81,98.00,98.00,110.00,98.00];
    bgmTimer=setInterval(()=>{
      if(!audioCtx) return;
      const i=bgmStep%melody.length;
      beep(melody[i],0.11,'square',0.022,0);
      beep(bass[i],0.16,'triangle',0.015,0.01);
      if(i%2===0) beep(1046.5,0.03,'square',0.006,0.02); // 轻微像素打击感
      bgmStep++;
    },180);
  }

  function playVoice(){
    if(!KSM_VOICE_URL) return;
    try{ const a=new Audio(KSM_VOICE_URL); a.volume=0.75; a.play().catch(()=>{}); }catch(e){}
  }

  function playYukinaSfx(){
    try{ ensureAudio(); const t=audioCtx.currentTime; const notes=[659,784,1047];
      notes.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(0.0001,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.14,t+i*0.08+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.08+0.26);o.start(t+i*0.08);o.stop(t+i*0.08+0.28);});
    }catch(e){}
  }
  function castYukina(){
    if(g.yukina<100) return;
    g.yukina=0;
    g.mode='凑友希那·Roselia终奏';
    g.eb=[];
    let killed=0;
    for(const e of g.en){ if(e.hp>0){ e.hp=0; e.dead=true; killed++; } }
    g.score += 50 + killed*10;
    for(let i=0;i<10;i++){
      const fx=mk('skillfx','🌹');
      const x=60+Math.random()*(W-120), y=120+Math.random()*(H-220);
      place(fx,x,y);
      setTimeout(()=>fx.remove(),700);
    }
    const img=document.createElement('img');
    img.className='obj yukina-flash';
    img.src=YUKINA_FLASH_IMG;
    img.alt='Yukina';
    game.appendChild(img);
    place(img,W/2,H/2);
    setTimeout(()=>img.remove(),620);

    const flash=mk('skillfx','Roselia · Yukina');
    flash.style.fontSize='30px'; flash.style.color='#ffc3f0';
    place(flash,W/2,H/2+170);
    setTimeout(()=>flash.remove(),800);
    playYukinaSfx();
    playVoice();
  }

  function step(dt){
    g.t+=dt;
    if(holdL||keys.has('ArrowLeft')||keys.has('a')) g.player.x-=320*dt;
    if(holdR||keys.has('ArrowRight')||keys.has('d')) g.player.x+=320*dt;
    if(holdU||keys.has('ArrowUp')||keys.has('w')) g.player.y-=280*dt;
    if(holdD||keys.has('ArrowDown')||keys.has('s')) g.player.y+=280*dt;
    g.player.x=Math.max(24,Math.min(W-24,g.player.x));
    g.player.y=Math.max(40,Math.min(H-24,g.player.y));

    if(g.t>=g.buffUntil && g.mode!=='普通'){ g.mode='普通'; g.buffType=null; }
    const active = g.t < g.buffUntil ? g.buffType : null;
    g.spawn-=dt; if(g.spawn<=0){addEnemy(); g.spawn=0.55;}
    g.shoot-=dt; if((autoFire||keys.has(' '))&&g.shoot<=0){
      addBullet();
      g.shoot = active==='keyboard' ? 0.22 : active ? 0.11 : 0.16;
    }

    const enemySlow = active==='bass' ? 0.6 : 1;
    for(const e of g.en){e.x+=e.vx*dt*enemySlow;e.y+=e.vy*dt*enemySlow;if(e.x<20||e.x>W-20)e.vx*=-1;e.fire-=dt;if(e.fire<=0){e.fire=1.2;const dx=g.player.x-e.x,dy=g.player.y-e.y,l=Math.hypot(dx,dy)||1;addEB(e.x,e.y,dx/l*180,dy/l*180)}}
    for(const b of g.bul){
      if(b.homing && g.en.length){
        let t=null,md=1e9; for(const e of g.en){const d=(e.x-b.x)**2+(e.y-b.y)**2; if(d<md){md=d;t=e;}}
        if(t){ b.vx += Math.sign(t.x-b.x)*24*dt; }
      }
      b.x+=(b.vx||0)*dt;b.y+=b.vy*dt;
    }
    for(const b of g.eb){b.x+=b.vx*dt*enemySlow;b.y+=b.vy*dt*enemySlow;}
    for(const d of g.drop)d.y+=d.vy*dt;

    for(const b of g.bul){
      for(const e of g.en){
        if(e.hp>0 && hit(b,e,7,16)){
          e.hp-=(b.dmg||1);
          if((b.pierce||0)>0){ b.pierce--; } else { b.dead=true; }
          if(e.hp<=0){e.dead=true;g.score+=10;g.yukina=Math.min(100,g.yukina+8);if(Math.random()<0.25)addDrop(e.x,e.y);} 
        }
      }
    }
    for(const b of g.eb) if(hit(b,g.player,6,14)){
      b.dead=true;
      if(g.shield>0) g.shield--; else g.hp--;
      if(g.hp<=0)g.over=true;
    }
    for(const d of g.drop) if(hit(d,g.player,16,14)){
      d.dead=true;
      g.buffUntil=Math.max(g.buffUntil,g.t)+8;
      g.buffType=d.kind;
      if(d.kind==='guitar'){ g.mode='吉他散射'; }
      else if(d.kind==='keyboard'){ g.mode='键盘激光'; }
      else if(d.kind==='drum'){ g.mode='鼓点护盾'; g.shield=Math.min(5,g.shield+3); }
      else if(d.kind==='bass'){ g.mode='贝斯减速'; }
      else if(d.kind==='violin'){ g.mode='小提琴追踪'; g.yukina=Math.min(100,g.yukina+22); }
    }

    g.en=g.en.filter(e=>!e.dead&&e.y<H+40);
    g.bul=g.bul.filter(b=>!b.dead&&b.y>-30);
    g.eb=g.eb.filter(b=>!b.dead&&b.y<H+30&&b.x>-30&&b.x<W+30);
    g.drop=g.drop.filter(d=>!d.dead&&d.y<H+30);

    for(const e of g.en) place(e.el,e.x,e.y);
    for(const b of g.bul) place(b.el,b.x,b.y);
    for(const b of g.eb) place(b.el,b.x,b.y);
    for(const d of g.drop) place(d.el,d.x,d.y);
    place(g.player.el,g.player.x,g.player.y);

    // 清理已删除元素
    [...game.children].forEach(el=>{
      const dead = [...g.en,...g.bul,...g.eb,...g.drop].every(o=>o.el!==el) && el!==g.player.el;
      if(dead) el.remove();
    });

    hud();
  }

  let last=performance.now();
  function loop(now){const dt=Math.min(0.033,(now-last)/1000);last=now;if(!g.over)step(dt);requestAnimationFrame(loop)}

  document.getElementById('left').onpointerdown=()=>{startBgm();holdL=true;};
  document.getElementById('left').onpointerup=()=>holdL=false;
  document.getElementById('left').onclick=()=>{startBgm();g.player.x-=80;hud();};
  document.getElementById('right').onpointerdown=()=>{startBgm();holdR=true;};
  document.getElementById('right').onpointerup=()=>holdR=false;
  document.getElementById('right').onclick=()=>{startBgm();g.player.x+=80;hud();};
  document.getElementById('up').onpointerdown=()=>{startBgm();holdU=true;};
  document.getElementById('up').onpointerup=()=>holdU=false;
  document.getElementById('up').onclick=()=>{startBgm();g.player.y-=60;hud();};
  document.getElementById('down').onpointerdown=()=>{startBgm();holdD=true;};
  document.getElementById('down').onpointerup=()=>holdD=false;
  document.getElementById('down').onclick=()=>{startBgm();g.player.y+=60;hud();};
  document.getElementById('fire').onclick=()=>{startBgm();addBullet();};
  yukinaBtn.onclick=()=>{startBgm();castYukina();hud();};
  document.getElementById('restart').onclick=init;
  window.addEventListener('keydown',e=>{startBgm();keys.add(e.key); if(e.key==='k'||e.key==='K'){castYukina();hud();}});
  window.addEventListener('keyup',e=>keys.delete(e.key));
  window.addEventListener('pointerup',()=>{holdL=false;holdR=false;holdU=false;holdD=false;});

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
