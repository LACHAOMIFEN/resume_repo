<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>KSM 打飞机 · 可触控版</title>
  <style>
    :root{--bg:#0a0e1f;--text:#eef2ff;--muted:#aab5ea;--accent:#ff79c8}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0%,#2a3374 0%,var(--bg) 45%);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:10px}
    .wrap{width:min(920px,100%);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:10px;box-shadow:0 14px 40px rgba(0,0,0,.35)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .stats{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
    .badge{padding:5px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08)}
    button{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;background:var(--accent);color:#2b0120}
    #game{width:100%;aspect-ratio:16/9;background:linear-gradient(180deg,#0c1230,#060912);border-radius:12px;border:1px solid rgba(255,255,255,.15);display:block;touch-action:none}
    .controls{display:flex;gap:8px;margin-top:8px}
    .btn{flex:1;padding:10px 12px;border-radius:10px;background:#7aa7ff;color:#091327;text-align:center;font-weight:700;user-select:none}
    .tip{color:var(--muted);margin-top:8px;font-size:12px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="stats">
        <span class="badge">分数 <b id="score">0</b></span>
        <span class="badge">生命 <b id="hp">5</b></span>
        <span class="badge">火力 <b id="mode">普通</b></span>
        <span class="badge">必杀 <b id="ult">0%</b></span>
      </div>
      <button id="restart">重开</button>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="controls">
      <div class="btn" id="btnAuto">自动开火: 开</div>
      <div class="btn" id="btnUlt">释放必杀</div>
    </div>
    <div class="tip">手机：手指在画布拖动飞机；电脑：A/D 或 ←/→。空格射击，J必杀。</div>
  </main>

<script>
const c = document.getElementById('game'), x = c.getContext('2d');
const W=c.width,H=c.height;
const scoreEl=document.getElementById('score');
const hpEl=document.getElementById('hp');
const modeEl=document.getElementById('mode');
const ultEl=document.getElementById('ult');
const btnUlt=document.getElementById('btnUlt');
const btnAuto=document.getElementById('btnAuto');
const restartBtn=document.getElementById('restart');
const keys=new Set();
const imgCache=new Map();
const ksm='https://bestdori.com/res/icon/chara_icon_1.png';
const enemyPool=Array.from({length:39},(_,i)=>`https://bestdori.com/res/icon/chara_icon_${i+2}.png`);
const load=s=>{if(imgCache.has(s))return imgCache.get(s);const i=new Image();i.crossOrigin='anonymous';i.src=s;imgCache.set(s,i);return i};
const rand=(a,b)=>Math.random()*(b-a)+a,pick=a=>a[(Math.random()*a.length)|0];
let autoFire=true, dragging=false, dragX=W/2;

let g;
function init(){
  g={t:0,score:0,hp:5,over:false,spawn:0,shootCd:0,ult:0,nextBoss:180,
     p:{x:W/2,y:H-75,r:30,s:360,img:load(ksm)},
     power:{type:'normal',until:0},bul:[],eb:[],en:[],drops:[],fx:[],boss:null};
  hud();
}
function hud(){scoreEl.textContent=g.score;hpEl.textContent=g.hp;ultEl.textContent=Math.floor(Math.min(100,g.ult))+'%';modeEl.textContent=({normal:'普通',guitar:'吉他',bread:'面包',chaos:'混沌'})[g.power.type];}
function hit(a,b){const dx=a.x-b.x,dy=a.y-b.y,r=(a.r||0)+(b.r||0);return dx*dx+dy*dy<=r*r}
function plane(px,py,s,col){x.save();x.translate(px,py);x.fillStyle=col;x.beginPath();x.moveTo(0,-30*s);x.lineTo(18*s,24*s);x.lineTo(0,14*s);x.lineTo(-18*s,24*s);x.closePath();x.fill();x.restore();}
function avatar(img,px,py,r){x.save();x.beginPath();x.arc(px,py,r,0,Math.PI*2);x.clip(); if(img&&img.complete)x.drawImage(img,px-r,py-r,r*2,r*2);else{x.fillStyle='#8ea1ff';x.fillRect(px-r,py-r,r*2,r*2)} x.restore();x.strokeStyle='rgba(255,255,255,.8)';x.lineWidth=2;x.beginPath();x.arc(px,py,r,0,Math.PI*2);x.stroke();}
function spawnEnemy(){const r=rand(18,26);g.en.push({x:rand(r,W-r),y:-28,r,hp:2,vx:rand(-45,45),vy:rand(70,130),img:load(pick(enemyPool)),fire:rand(.9,2)});}
function spawnBoss(){g.boss={x:W/2,y:95,r:64,hp:100,max:100,vx:120,img:load(pick(enemyPool)),fire:.5};}
function dropAt(px,py){g.drops.push({x:px,y:py,r:16,vy:95,k:Math.random()<.5?'guitar':'bread',spin:rand(0,6.2)});}
function shoot(){if(g.shootCd>0||g.over)return;g.shootCd=.12;const p=g.p,t=g.power.type;if(t==='normal')g.bul.push({x:p.x,y:p.y-25,vx:0,vy:-520,r:5,sh:'dot',d:1,l:2,col:'#ffe47a'});else if(t==='guitar')for(let i=-1;i<=1;i++)g.bul.push({x:p.x+i*12,y:p.y-22,vx:i*90,vy:-470,r:8,sh:'dia',d:1,l:2,col:'#ffb4ff'});else if(t==='bread')g.bul.push({x:p.x,y:p.y-22,vx:0,vy:-390,r:12,sh:'bag',d:3,l:2,col:'#ffdd95',sp:rand(0,6.2)});else for(let i=0;i<8;i++){const a=i*Math.PI/4+g.t*1.2;g.bul.push({x:p.x,y:p.y-18,vx:Math.cos(a)*180,vy:-250+Math.sin(a)*130,r:6,sh:'star',d:1,l:1.3,col:`hsl(${(g.t*180+i*35)%360} 90% 65%)`})}}
function ult(){if(g.ult<100||g.over)return;g.ult=0;g.eb=[];for(const e of g.en)e.hp=0;if(g.boss)g.boss.hp-=40;g.score+=25;g.fx.push({x:W/2,y:H/2,r:30,l:1,col:'#8fd2ff',big:true});hud();}
function applyDrop(k){const now=performance.now()/1000;if(g.power.type!=='normal'&&Math.random()<.35){g.power.type='chaos';g.power.until=now+8}else{g.power.type=k;g.power.until=now+10}g.ult=Math.min(100,g.ult+16);hud();}
function dmg(){g.hp--;g.fx.push({x:g.p.x,y:g.p.y,r:10,l:.35,col:'#ff6f6f'});if(g.hp<=0)g.over=true;hud();}

function upd(dt){
  g.t+=dt;const now=performance.now()/1000;if(g.power.type!=='normal'&&now>g.power.until){g.power.type='normal';hud();}
  if(dragging) g.p.x += (dragX-g.p.x)*Math.min(1,dt*12);
  if(keys.has('ArrowLeft')||keys.has('a')||keys.has('A')) g.p.x-=g.p.s*dt;
  if(keys.has('ArrowRight')||keys.has('d')||keys.has('D')) g.p.x+=g.p.s*dt;
  g.p.x=Math.max(g.p.r,Math.min(W-g.p.r,g.p.x));

  if(autoFire||keys.has(' ')||keys.has('Space'))shoot();
  g.shootCd=Math.max(0,g.shootCd-dt);

  if(!g.boss){g.spawn-=dt;if(g.spawn<=0){spawnEnemy();g.spawn=Math.max(.25,.9-g.score*0.0025)}}
  if(!g.boss&&g.score>=g.nextBoss){spawnBoss();g.nextBoss+=220}

  for(const e of g.en){e.x+=e.vx*dt;e.y+=e.vy*dt;if(e.x<e.r||e.x>W-e.r)e.vx*=-1;e.fire-=dt;if(e.fire<=0){e.fire=rand(1.1,2.1);const dx=g.p.x-e.x,dy=g.p.y-e.y,L=Math.hypot(dx,dy)||1;g.eb.push({x:e.x,y:e.y,vx:dx/L*210,vy:dy/L*210,r:5,l:4})}}
  if(g.boss){const b=g.boss;b.x+=b.vx*dt;if(b.x<b.r||b.x>W-b.r)b.vx*=-1;b.fire-=dt;if(b.fire<=0){b.fire=.45;for(let i=-2;i<=2;i++)g.eb.push({x:b.x+i*16,y:b.y+28,vx:i*45,vy:240,r:6,l:5})}if(b.hp<=0){g.score+=120;g.ult=Math.min(100,g.ult+40);for(let i=0;i<4;i++)dropAt(b.x+rand(-35,35),b.y+rand(-10,15));g.boss=null;hud();}}

  for(const b of g.bul){b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;if(b.sh==='bag')b.sp=(b.sp||0)+dt*8}
  for(const b of g.eb){b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt}
  for(const d of g.drops){d.y+=d.vy*dt;d.spin+=dt*2}

  for(const b of g.bul){for(const e of g.en)if(e.hp>0&&hit(b,e)){e.hp-=b.d||1;b.l=0;if(e.hp<=0){g.score+=10;if(Math.random()<.3)dropAt(e.x,e.y);g.ult=Math.min(100,g.ult+2)}}if(g.boss&&hit(b,g.boss)){g.boss.hp-=b.d||1;b.l=0;g.ult=Math.min(100,g.ult+.5)}}
  for(const b of g.eb)if(hit(b,g.p)){b.l=0;dmg()}
  for(const e of g.en)if(e.hp>0&&hit(e,g.p)){e.hp=0;dmg()}
  if(g.boss&&hit(g.boss,g.p))dmg();
  for(const d of g.drops)if(hit(d,g.p)){d.dead=true;applyDrop(d.k)}

  g.en=g.en.filter(e=>e.hp>0&&e.y<H+40);g.bul=g.bul.filter(b=>b.l>0&&b.x>-80&&b.x<W+80&&b.y>-80&&b.y<H+80);g.eb=g.eb.filter(b=>b.l>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);g.drops=g.drops.filter(d=>!d.dead&&d.y<H+30);g.fx=g.fx.filter(f=>(f.l-=dt)>0);
  hud();
}

function drawBul(b){x.save();x.translate(b.x,b.y);x.fillStyle=b.col||'#fff';if(b.sh==='dot'){x.beginPath();x.arc(0,0,b.r,0,Math.PI*2);x.fill()}else if(b.sh==='dia'){x.rotate(g.t*8);x.beginPath();x.moveTo(0,-b.r*1.2);x.lineTo(b.r,0);x.lineTo(0,b.r*1.2);x.lineTo(-b.r,0);x.closePath();x.fill()}else if(b.sh==='bag'){x.rotate(b.sp||0);x.beginPath();x.ellipse(0,0,b.r*1.7,b.r*.6,0,0,Math.PI*2);x.fill()}else{x.rotate(g.t*8);x.beginPath();for(let i=0;i<10;i++){const a=i*Math.PI/5,rr=i%2?b.r*.5:b.r*1.25;x.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}x.closePath();x.fill()}x.restore();}

function draw(){
  x.clearRect(0,0,W,H);
  for(let i=0;i<75;i++){const px=(i*137+g.t*70*(i%3+1))%W,py=(i*79+g.t*36*(i%5+1))%H;x.fillStyle=`rgba(255,255,255,${0.12+(i%5)*0.05})`;x.fillRect(px,py,2,2)}
  plane(g.p.x,g.p.y,1.2,'#ff74c6');avatar(g.p.img,g.p.x,g.p.y-4,14);
  for(const e of g.en){plane(e.x,e.y,.95,'#6f88ff');avatar(e.img,e.x,e.y-3,11)}
  if(g.boss){plane(g.boss.x,g.boss.y,2.2,'#b56cff');avatar(g.boss.img,g.boss.x,g.boss.y-6,26);const w=320,h=12,b=g.boss;const bx=(W-w)/2,by=10;x.fillStyle='rgba(255,255,255,.18)';x.fillRect(bx,by,w,h);x.fillStyle='#ff7fbf';x.fillRect(bx,by,w*(b.hp/b.max),h);x.strokeStyle='rgba(255,255,255,.45)';x.strokeRect(bx,by,w,h)}
  for(const b of g.bul)drawBul(b);
  x.fillStyle='#ff6f6f';for(const b of g.eb){x.beginPath();x.arc(b.x,b.y,b.r,0,Math.PI*2);x.fill()}
  for(const d of g.drops){x.save();x.translate(d.x,d.y);x.rotate(d.spin);x.font='24px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(d.k==='guitar'?'🎸':'🥖',0,0);x.restore()}
  for(const f of g.fx){x.globalAlpha=Math.max(0,f.l*2);x.strokeStyle=f.col;x.lineWidth=f.big?8:3;x.beginPath();x.arc(f.x,f.y,f.r*(1+(1-f.l)*2.2),0,Math.PI*2);x.stroke();x.globalAlpha=1}
  if(g.over){x.fillStyle='rgba(0,0,0,.58)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.textAlign='center';x.font='bold 56px sans-serif';x.fillText('GAME OVER',W/2,H/2-14);x.font='28px sans-serif';x.fillText(`Score: ${g.score}`,W/2,H/2+34)}
}

let last=performance.now();
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;if(g && !g.over)upd(dt);if(g)draw();requestAnimationFrame(loop)}

function canvasToGame(clientX){const r=c.getBoundingClientRect();return (clientX-r.left)/r.width*W;}
c.addEventListener('pointerdown',e=>{dragging=true;dragX=canvasToGame(e.clientX);c.setPointerCapture(e.pointerId)});
c.addEventListener('pointermove',e=>{if(dragging)dragX=canvasToGame(e.clientX)});
c.addEventListener('pointerup',()=>dragging=false);
c.addEventListener('pointercancel',()=>dragging=false);

window.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' ','a','A','d','D','j','J'].includes(e.key))e.preventDefault();keys.add(e.key==='Spacebar'?' ':e.key);if(e.key==='j'||e.key==='J')ult();});
window.addEventListener('keyup',e=>keys.delete(e.key==='Spacebar'?' ':e.key));

btnUlt.onclick=ult;
btnAuto.onclick=()=>{autoFire=!autoFire;btnAuto.textContent='自动开火: '+(autoFire?'开':'关')};
restartBtn.onclick=init;

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
