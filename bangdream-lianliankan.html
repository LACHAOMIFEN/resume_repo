<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BanG Dream! 连连看（人物版）</title>
  <style>
    :root {
      --bg: #0f1020;
      --panel: #1b1d36;
      --card: #2a2d52;
      --card-open: #444a80;
      --ok: #52d273;
      --text: #eef0ff;
      --muted: #a8add8;
      --accent: #ff77c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #272a54 0%, var(--bg) 45%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .wrap {
      width: min(980px, 100%);
      background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 32px);
    }
    .sub { color: var(--muted); margin-bottom: 14px; }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 6px 10px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #230018;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.05); }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      position: relative;
      height: 88px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.18);
      background: var(--card);
      cursor: pointer;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform .2s ease, background .2s ease;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
      user-select: none;
    }
    .card:hover { transform: translateY(-2px); }
    .card .front, .card .back {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 8px;
      font-size: 14px;
      line-height: 1.25;
      transition: opacity .15s ease;
    }
    .card .front {
      opacity: 0;
      background: var(--card-open);
      font-weight: 700;
    }
    .card .back {
      opacity: 1;
      font-size: 30px;
      color: #ffd3ef;
    }
    .card.open .front, .card.matched .front { opacity: 1; }
    .card.open .back, .card.matched .back { opacity: 0; }
    .card.matched {
      background: rgba(82, 210, 115, .22);
      border-color: rgba(82,210,115,.6);
      cursor: default;
    }

    .tips {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 780px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .card { height: 76px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BanG Dream! 连连看（人物版）</h1>
    <div class="sub">点击两张相同人物卡片即可消除，清空全部卡片获胜。</div>

    <div class="bar">
      <div class="stats">
        <span class="badge">步数：<b id="moves">0</b></span>
        <span class="badge">用时：<b id="time">00:00</b></span>
        <span class="badge">已配对：<b id="pairs">0</b>/<span id="totalPairs">0</span></span>
      </div>
      <button id="restart">重新开始</button>
    </div>

    <section id="grid" class="grid"></section>

    <div class="tips">注：这是“翻牌配对”版连连看。若你想要“必须路径可连（最多两拐点）”的经典连连看，我可以再给你升级成完整版规则。</div>
  </main>

  <script>
    const members = [
      "户山香澄", "花园多惠", "牛込里美", "山吹沙绫", "市谷有咲",
      "美竹兰", "青叶摩卡", "上原绯玛丽", "宇田川巴", "羽泽鸫",
      "丸山彩", "冰川日菜", "白鹭千圣", "大和麻弥", "若宫伊芙",
      "凑友希那", "今井莉莎", "宇田川亚子", "白金燐子", "冰川纱夜"
    ];

    const pickCount = 12; // 12 对，共 24 张
    const picked = shuffle([...members]).slice(0, pickCount);

    const deck = shuffle([...picked, ...picked]).map((name, i) => ({
      id: i + "-" + Math.random().toString(36).slice(2),
      name,
      open: false,
      matched: false
    }));

    const grid = document.getElementById('grid');
    const movesEl = document.getElementById('moves');
    const timeEl = document.getElementById('time');
    const pairsEl = document.getElementById('pairs');
    const totalPairsEl = document.getElementById('totalPairs');
    const restartBtn = document.getElementById('restart');

    let moves = 0;
    let pairs = 0;
    let first = null;
    let second = null;
    let lock = false;
    let startTs = Date.now();

    totalPairsEl.textContent = pickCount;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(ms) {
      const sec = Math.floor(ms / 1000);
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function render() {
      grid.innerHTML = '';
      deck.forEach((card, idx) => {
        const el = document.createElement('button');
        el.className = `card ${card.open ? 'open' : ''} ${card.matched ? 'matched' : ''}`;
        el.disabled = card.matched;
        el.setAttribute('aria-label', card.open || card.matched ? card.name : '未翻开的卡片');
        el.innerHTML = `
          <span class="front">${card.name}</span>
          <span class="back">🎸</span>
        `;
        el.addEventListener('click', () => onCardClick(idx));
        grid.appendChild(el);
      });
      movesEl.textContent = moves;
      pairsEl.textContent = pairs;
    }

    function onCardClick(idx) {
      const card = deck[idx];
      if (lock || card.open || card.matched) return;

      card.open = true;
      render();

      if (!first) {
        first = idx;
        return;
      }

      second = idx;
      moves++;
      lock = true;

      const a = deck[first];
      const b = deck[second];

      if (a.name === b.name) {
        a.matched = b.matched = true;
        pairs++;
        resetTurn();
        render();

        if (pairs === pickCount) {
          setTimeout(() => {
            alert(`完成！你用了 ${moves} 步，耗时 ${formatTime(Date.now() - startTs)}。`);
          }, 100);
        }
      } else {
        setTimeout(() => {
          a.open = false;
          b.open = false;
          resetTurn();
          render();
        }, 650);
      }
    }

    function resetTurn() {
      first = null;
      second = null;
      lock = false;
    }

    restartBtn.addEventListener('click', () => location.reload());

    setInterval(() => {
      timeEl.textContent = formatTime(Date.now() - startTs);
    }, 250);

    render();
  </script>
</body>
</html>
