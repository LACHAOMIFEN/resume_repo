<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BanG Dream! 经典连连看（人物图片）</title>
  <style>
    :root {
      --bg: #101227;
      --panel: #1a1e3d;
      --tile: #2a2f5c;
      --tile-border: rgba(255,255,255,.2);
      --text: #eef0ff;
      --muted: #aeb4e7;
      --accent: #ff72c3;
      --ok: #57d687;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: radial-gradient(circle at 20% 5%, #2a2f63 0%, var(--bg) 45%);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    .wrap {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: clamp(22px, 3vw, 30px); }
    .sub { color: var(--muted); margin-bottom: 12px; }
    .bar {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 14px; }
    .badge {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 6px 10px;
    }
    .btns { display: flex; gap: 8px; }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 13px;
      font-weight: 700;
      cursor: pointer;
    }
    #restart { background: var(--accent); color: #260018; }
    #shuffle { background: #7aa7ff; color: #071229; }

    .board-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto;
      padding: 6px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 72px);
      grid-template-rows: repeat(8, 72px);
      gap: 6px;
    }

    .tile {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      border: 1px solid var(--tile-border);
      background: var(--tile);
      padding: 4px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform .12s ease, box-shadow .12s ease, opacity .15s ease;
    }
    .tile:hover { transform: translateY(-1px); }
    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .tile.selected {
      box-shadow: 0 0 0 3px #ffd06d;
      border-color: #ffd06d;
    }
    .tile.removed {
      visibility: hidden;
      pointer-events: none;
    }

    #lines {
      position: absolute;
      inset: 6px;
      pointer-events: none;
      overflow: visible;
    }
    .tip { color: var(--muted); margin-top: 10px; font-size: 13px; }

    @media (max-width: 760px) {
      #board { grid-template-columns: repeat(8, 44px); grid-template-rows: repeat(8, 44px); gap: 4px; }
      .tile { width: 44px; height: 44px; padding: 2px; border-radius: 7px; }
      .tile img { border-radius: 6px; }
      #lines { inset: 6px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BanG Dream! 连连看（经典连线版）</h1>
    <div class="sub">规则：只能连接相同人物图片；路径不能穿过未消除格子，且最多 2 次拐弯。</div>

    <div class="bar">
      <div class="stats">
        <span class="badge">步数：<b id="moves">0</b></span>
        <span class="badge">剩余：<b id="left">64</b></span>
        <span class="badge">用时：<b id="time">00:00</b></span>
      </div>
      <div class="btns">
        <button id="shuffle">重排剩余</button>
        <button id="restart">重新开始</button>
      </div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div id="board"></div>
      <svg id="lines"></svg>
    </div>

    <div class="tip">图案使用 BanG Dream 人物头像图标（Bestdori 资源链接）。</div>
  </main>

  <script>
    const ROWS = 8, COLS = 8;
    const TOTAL = ROWS * COLS;
    const PAIRS = TOTAL / 2;

    const imagePool = Array.from({ length: 40 }, (_, i) => `https://bestdori.com/res/icon/chara_icon_${i + 1}.png`);

    const boardEl = document.getElementById('board');
    const linesEl = document.getElementById('lines');
    const movesEl = document.getElementById('moves');
    const leftEl = document.getElementById('left');
    const timeEl = document.getElementById('time');
    const restartBtn = document.getElementById('restart');
    const shuffleBtn = document.getElementById('shuffle');

    let board = []; // 0 empty, >0 icon id
    let selected = null;
    let moves = 0;
    let left = TOTAL;
    let startTs = Date.now();

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(ms) {
      const sec = Math.floor(ms / 1000);
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function idx(r, c) { return r * COLS + c; }

    function initGame() {
      selected = null;
      moves = 0;
      left = TOTAL;
      startTs = Date.now();

      const pickedIcons = shuffle([...imagePool]).slice(0, PAIRS);
      const pairItems = shuffle([...pickedIcons, ...pickedIcons]);

      const idMap = new Map();
      let idCounter = 1;
      board = pairItems.map(src => {
        if (!idMap.has(src)) idMap.set(src, idCounter++);
        return { src, id: idMap.get(src) };
      });

      if (!hasAnyMove()) shuffleRemainingUntilPlayable();
      render();
      updateStats();
      clearLines();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((cell, i) => {
        const r = Math.floor(i / COLS);
        const c = i % COLS;
        const btn = document.createElement('button');
        btn.className = 'tile' + (cell.id === 0 ? ' removed' : '');
        btn.dataset.r = r;
        btn.dataset.c = c;
        if (selected && selected.r === r && selected.c === c) btn.classList.add('selected');

        if (cell.id !== 0) {
          const img = document.createElement('img');
          img.src = cell.src;
          img.alt = '人物图片';
          btn.appendChild(img);
        }

        btn.addEventListener('click', () => onTileClick(r, c));
        boardEl.appendChild(btn);
      });
      resizeSvg();
    }

    function updateStats() {
      movesEl.textContent = moves;
      leftEl.textContent = left;
    }

    function onTileClick(r, c) {
      const i = idx(r, c);
      const cell = board[i];
      if (cell.id === 0) return;

      if (!selected) {
        selected = { r, c };
        render();
        return;
      }

      if (selected.r === r && selected.c === c) {
        selected = null;
        render();
        return;
      }

      const a = board[idx(selected.r, selected.c)];
      const b = board[i];

      if (a.id !== b.id) {
        selected = { r, c };
        render();
        return;
      }

      const path = findPath(selected.r, selected.c, r, c);
      if (!path) {
        selected = { r, c };
        render();
        return;
      }

      moves++;
      drawPath(path);

      const old = { ...selected };
      selected = null;

      setTimeout(() => {
        board[idx(old.r, old.c)] = { id: 0, src: '' };
        board[idx(r, c)] = { id: 0, src: '' };
        left -= 2;
        updateStats();
        render();

        if (left === 0) {
          setTimeout(() => alert(`通关！步数 ${moves}，用时 ${formatTime(Date.now() - startTs)}`), 80);
          return;
        }

        if (!hasAnyMove()) {
          shuffleRemainingUntilPlayable();
          render();
        }
      }, 160);
    }

    function buildGridWithBorder() {
      const H = ROWS + 2, W = COLS + 2;
      const g = Array.from({ length: H }, () => Array(W).fill(0));
      for (let r = 1; r <= ROWS; r++) {
        for (let c = 1; c <= COLS; c++) {
          g[r][c] = board[idx(r - 1, c - 1)].id;
        }
      }
      return g;
    }

    function findPath(r1, c1, r2, c2) {
      // BFS over (r,c,dir,turns), max turns = 2
      const g = buildGridWithBorder();
      const sr = r1 + 1, sc = c1 + 1, tr = r2 + 1, tc = c2 + 1;
      const H = ROWS + 2, W = COLS + 2;
      const dirs = [[-1,0],[0,1],[1,0],[0,-1]];

      const visited = Array.from({ length: H }, () => Array.from({ length: W }, () => Array(4).fill(99)));
      const queue = [];

      for (let d = 0; d < 4; d++) {
        visited[sr][sc][d] = 0;
        queue.push({ r: sr, c: sc, d, t: 0, path: [[sr, sc]] });
      }

      while (queue.length) {
        const cur = queue.shift();
        const [dr, dc] = dirs[cur.d];
        const nr = cur.r + dr, nc = cur.c + dc;
        if (nr < 0 || nr >= H || nc < 0 || nc >= W) continue;

        const passable = (nr === tr && nc === tc) || g[nr][nc] === 0;
        if (!passable) continue;

        for (let nd = 0; nd < 4; nd++) {
          const nt = cur.t + (nd === cur.d ? 0 : 1);
          if (nt > 2) continue;

          if (visited[nr][nc][nd] <= nt) continue;
          visited[nr][nc][nd] = nt;

          const npath = [...cur.path, [nr, nc]];
          if (nr === tr && nc === tc) {
            return compressPath(npath);
          }

          queue.push({ r: nr, c: nc, d: nd, t: nt, path: npath });
        }
      }
      return null;
    }

    function compressPath(path) {
      // Keep only turning points
      if (path.length <= 2) return path;
      const out = [path[0]];
      for (let i = 1; i < path.length - 1; i++) {
        const [r0, c0] = path[i - 1];
        const [r1, c1] = path[i];
        const [r2, c2] = path[i + 1];
        const d1 = [r1 - r0, c1 - c0];
        const d2 = [r2 - r1, c2 - c1];
        if (d1[0] !== d2[0] || d1[1] !== d2[1]) out.push(path[i]);
      }
      out.push(path[path.length - 1]);
      return out;
    }

    function hasAnyMove() {
      const positionsById = new Map();
      board.forEach((cell, i) => {
        if (!cell.id) return;
        if (!positionsById.has(cell.id)) positionsById.set(cell.id, []);
        positionsById.get(cell.id).push(i);
      });

      for (const [, list] of positionsById) {
        for (let i = 0; i < list.length; i++) {
          for (let j = i + 1; j < list.length; j++) {
            const a = list[i], b = list[j];
            const r1 = Math.floor(a / COLS), c1 = a % COLS;
            const r2 = Math.floor(b / COLS), c2 = b % COLS;
            if (findPath(r1, c1, r2, c2)) return true;
          }
        }
      }
      return false;
    }

    function shuffleRemainingUntilPlayable() {
      const remain = board.filter(c => c.id !== 0);
      let tries = 0;
      do {
        shuffle(remain);
        let p = 0;
        board = board.map(c => (c.id === 0 ? c : remain[p++]));
        tries++;
      } while (!hasAnyMove() && tries < 200);
    }

    function resizeSvg() {
      const rect = boardEl.getBoundingClientRect();
      linesEl.setAttribute('width', rect.width);
      linesEl.setAttribute('height', rect.height);
      linesEl.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
    }

    function cellCenter(r, c) {
      const tile = boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
      if (!tile) return { x: 0, y: 0 };
      const b = tile.getBoundingClientRect();
      const p = boardEl.getBoundingClientRect();
      return { x: b.left - p.left + b.width / 2, y: b.top - p.top + b.height / 2 };
    }

    function drawPath(path) {
      clearLines();
      const points = path.map(([rr, cc]) => {
        const r = rr - 1, c = cc - 1;
        // Border points: place just outside board
        if (r < 0) return { x: cellCenter(0, Math.max(0, Math.min(COLS - 1, c))).x, y: -4 };
        if (r >= ROWS) return { x: cellCenter(ROWS - 1, Math.max(0, Math.min(COLS - 1, c))).x, y: boardEl.getBoundingClientRect().height + 4 };
        if (c < 0) return { x: -4, y: cellCenter(Math.max(0, Math.min(ROWS - 1, r)), 0).y };
        if (c >= COLS) return { x: boardEl.getBoundingClientRect().width + 4, y: cellCenter(Math.max(0, Math.min(ROWS - 1, r)), COLS - 1).y };
        return cellCenter(r, c);
      });

      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      poly.setAttribute('points', points.map(p => `${p.x},${p.y}`).join(' '));
      poly.setAttribute('fill', 'none');
      poly.setAttribute('stroke', '#ffe27a');
      poly.setAttribute('stroke-width', '5');
      poly.setAttribute('stroke-linecap', 'round');
      poly.setAttribute('stroke-linejoin', 'round');
      poly.setAttribute('opacity', '0.95');
      linesEl.appendChild(poly);

      setTimeout(clearLines, 180);
    }

    function clearLines() { linesEl.innerHTML = ''; }

    restartBtn.addEventListener('click', initGame);
    shuffleBtn.addEventListener('click', () => {
      shuffleRemainingUntilPlayable();
      selected = null;
      render();
    });

    window.addEventListener('resize', () => {
      resizeSvg();
    });

    setInterval(() => {
      timeEl.textContent = formatTime(Date.now() - startTs);
    }, 250);

    initGame();
  </script>
</body>
</html>
