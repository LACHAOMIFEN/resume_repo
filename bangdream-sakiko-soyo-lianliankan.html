<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>祥子×素世 连连看（外链图片版）</title>
  <style>
    body{margin:0;background:#10142b;color:#eef;font-family:system-ui,"PingFang SC";display:grid;place-items:center;min-height:100vh;padding:12px}
    .wrap{width:min(980px,100%);background:#1b2144;border:1px solid #ffffff22;border-radius:14px;padding:12px}
    .bar{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    .stats{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:#b9c2ff}
    .stats span{background:#ffffff14;border:1px solid #ffffff24;border-radius:999px;padding:6px 10px}
    button{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;background:#ff7ac6;color:#260018}
    .boardWrap{position:relative;width:fit-content;margin:auto;padding:6px;background:#ffffff0a;border-radius:10px;border:1px solid #ffffff22}
    #board{display:grid;grid-template-columns:repeat(8,72px);grid-template-rows:repeat(8,72px);gap:6px}
    .tile{width:72px;height:72px;border:1px solid #ffffff2f;border-radius:9px;background:#2b356e;padding:2px;cursor:pointer}
    .tile img{width:100%;height:100%;object-fit:cover;border-radius:7px;display:block}
    .tile.sel{box-shadow:0 0 0 3px #ffd56d;border-color:#ffd56d}
    .tile.removed{visibility:hidden;pointer-events:none}
    #lines{position:absolute;inset:6px;pointer-events:none}
    .tip{margin-top:8px;color:#aeb6e4;font-size:12px}
    @media(max-width:760px){#board{grid-template-columns:repeat(8,44px);grid-template-rows:repeat(8,44px);gap:4px}.tile{width:44px;height:44px;padding:1px}}
  </style>
</head>
<body>
  <main class="wrap">
    <h3 style="margin:0 0 8px">丰川祥子 × 长崎素世 连连看（外链图片）</h3>
    <div style="color:#b9c2ff;font-size:13px;margin-bottom:8px">规则：仅可连接相同图片；路径不能穿过未消除格子；最多2次拐弯。</div>
    <div class="bar">
      <div class="stats">
        <span>步数 <b id="moves">0</b></span>
        <span>剩余 <b id="left">64</b></span>
        <span>用时 <b id="time">00:00</b></span>
      </div>
      <div style="display:flex;gap:8px"><button id="shuffle">重排</button><button id="restart">重开</button></div>
    </div>
    <div class="boardWrap"><div id="board"></div><svg id="lines"></svg></div>
    <div class="tip">图片来源：bandori.fandom 外链（祥子/素世不同服装形象）。</div>
  </main>
<script>
const ROWS=8,COLS=8,TOTAL=64;
const boardEl=document.getElementById('board'),linesEl=document.getElementById('lines');
const movesEl=document.getElementById('moves'),leftEl=document.getElementById('left'),timeEl=document.getElementById('time');
const variants=[
 {id:'sakiko1',src:'https://static.wikia.nocookie.net/bandori/images/3/3d/Togawa_Sakiko_-_Casual_Live2D_Model.png/revision/latest?cb=20240311211835'},
 {id:'sakiko2',src:'https://static.wikia.nocookie.net/bandori/images/5/58/Togawa_Sakiko_-_JH_Winter_Uniform_Live2D.png/revision/latest?cb=20230908201158'},
 {id:'sakiko3',src:'https://static.wikia.nocookie.net/bandori/images/e/e6/Togawa_Sakiko_-_Summer_Uniform_Live2D.png/revision/latest?cb=20240311200637'},
 {id:'sakiko4',src:'https://static.wikia.nocookie.net/bandori/images/0/07/Togawa_Sakiko_-_Winter_Uniform_Live2D.png/revision/latest?cb=20230908201216'},
 {id:'sakiko5',src:'https://static.wikia.nocookie.net/bandori/images/d/df/Sakiko_Casual_Anime.png/revision/latest?cb=20241201065128'},
 {id:'sakiko6',src:'https://static.wikia.nocookie.net/bandori/images/2/27/Sakiko_anime.png/revision/latest?cb=20230629163400'},
 {id:'soyo1',src:'https://static.wikia.nocookie.net/bandori/images/3/3f/Nagasaki_Soyo_-_Child.png/revision/latest?cb=20240517074520'},
 {id:'soyo2',src:'https://static.wikia.nocookie.net/bandori/images/2/25/Nagasaki_Soyo_-_Summer_Uniforn_Live2D.png/revision/latest?cb=20240311203804'},
 {id:'soyo3',src:'https://static.wikia.nocookie.net/bandori/images/a/a0/Nagasaki_Soyo_-_Winter_Uniform_Live2D.png/revision/latest?cb=20230908201129'},
 {id:'soyo4',src:'https://static.wikia.nocookie.net/bandori/images/2/28/Soyo_Mayoi_Neko.png/revision/latest?cb=20240704202525'},
 {id:'soyo5',src:'https://static.wikia.nocookie.net/bandori/images/8/81/Soyo_GBP.png/revision/latest?cb=20230628090700'},
 {id:'soyo6',src:'https://static.wikia.nocookie.net/bandori/images/b/be/Soyo_GBP-2.png/revision/latest?cb=20230628090709'},
 {id:'sakiko7',src:'https://static.wikia.nocookie.net/bandori/images/5/58/Togawa_Sakiko_-_JH_Winter_Uniform_Live2D.png/revision/latest/scale-to-width-down/300?cb=20230908201158'},
 {id:'soyo7',src:'https://static.wikia.nocookie.net/bandori/images/9/91/Soyo_anime.png/revision/latest?cb=20230628090504'},
 {id:'sakiko8',src:'https://static.wikia.nocookie.net/bandori/images/e/e6/Togawa_Sakiko_-_Summer_Uniform_Live2D.png/revision/latest/scale-to-width-down/300?cb=20240311200637'},
 {id:'soyo8',src:'https://static.wikia.nocookie.net/bandori/images/a/a0/Nagasaki_Soyo_-_Winter_Uniform_Live2D.png/revision/latest/scale-to-width-down/300?cb=20230908201129'}
];
let board=[],selected=null,moves=0,left=TOTAL,start=Date.now();
const idx=(r,c)=>r*COLS+c;
const sh=a=>{for(let i=a.length-1;i>0;i--){let j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]]}return a};
function init(){moves=0;left=TOTAL;selected=null;start=Date.now();let deck=[];for(const v of variants)for(let i=0;i<4;i++)deck.push({id:v.id,src:v.src});board=sh(deck);if(!hasMove())reshufflePlayable();render();update();clearLines()}
function update(){movesEl.textContent=moves;leftEl.textContent=left}
function render(){boardEl.innerHTML='';board.forEach((cell,i)=>{const r=(i/COLS)|0,c=i%COLS;const b=document.createElement('button');b.className='tile'+(cell.id===0?' removed':'')+(selected&&selected.r===r&&selected.c===c?' sel':'');b.dataset.r=r;b.dataset.c=c;if(cell.id!==0){const im=document.createElement('img');im.src=cell.src;im.alt='角色图片';im.loading='lazy';im.onerror=()=>{im.style.background='#223';im.style.objectFit='contain';im.src='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="100%" height="100%" fill="#334"/><text x="50%" y="54%" fill="#ccd" font-size="14" text-anchor="middle">Image</text></svg>')};b.appendChild(im)}b.onclick=()=>clickCell(r,c);boardEl.appendChild(b)});resizeSvg()}
function clickCell(r,c){const i=idx(r,c);if(board[i].id===0)return;if(!selected){selected={r,c};return render()}if(selected.r===r&&selected.c===c){selected=null;return render()}const j=idx(selected.r,selected.c);if(board[i].id!==board[j].id){selected={r,c};return render()}const path=findPath(selected.r,selected.c,r,c);if(!path){selected={r,c};return render()}moves++;drawPath(path);const p={...selected};selected=null;setTimeout(()=>{board[idx(p.r,p.c)]={id:0,src:''};board[idx(r,c)]={id:0,src:''};left-=2;update();render();if(left===0)return setTimeout(()=>alert(`通关！步数${moves}，用时${fmt(Date.now()-start)}`),50);if(!hasMove()){reshufflePlayable();render()}},130)}
function grid(){const H=ROWS+2,W=COLS+2,g=Array.from({length:H},()=>Array(W).fill(0));for(let r=1;r<=ROWS;r++)for(let c=1;c<=COLS;c++)g[r][c]=board[idx(r-1,c-1)].id;return g}
function findPath(r1,c1,r2,c2){const g=grid(),sr=r1+1,sc=c1+1,tr=r2+1,tc=c2+1,H=ROWS+2,W=COLS+2,dirs=[[-1,0],[0,1],[1,0],[0,-1]];const vis=Array.from({length:H},()=>Array.from({length:W},()=>Array(4).fill(99)));const q=[];for(let d=0;d<4;d++){vis[sr][sc][d]=0;q.push({r:sr,c:sc,d,t:0,path:[[sr,sc]]})}
 while(q.length){const cur=q.shift();const [dr,dc]=dirs[cur.d],nr=cur.r+dr,nc=cur.c+dc;if(nr<0||nr>=H||nc<0||nc>=W)continue;const pass=(nr===tr&&nc===tc)||g[nr][nc]===0;if(!pass)continue;for(let nd=0;nd<4;nd++){const nt=cur.t+(nd===cur.d?0:1);if(nt>2||vis[nr][nc][nd]<=nt)continue;vis[nr][nc][nd]=nt;const np=[...cur.path,[nr,nc]];if(nr===tr&&nc===tc)return compress(np);q.push({r:nr,c:nc,d:nd,t:nt,path:np})}}
 return null}
function compress(p){if(p.length<=2)return p;const o=[p[0]];for(let i=1;i<p.length-1;i++){const [r0,c0]=p[i-1],[r1,c1]=p[i],[r2,c2]=p[i+1];if(r1-r0!==r2-r1||c1-c0!==c2-c1)o.push(p[i])}o.push(p[p.length-1]);return o}
function hasMove(){const map=new Map();board.forEach((c,i)=>{if(!c.id)return; if(!map.has(c.id))map.set(c.id,[]); map.get(c.id).push(i)});for(const arr of map.values())for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){const a=arr[i],b=arr[j];if(findPath((a/COLS)|0,a%COLS,(b/COLS)|0,b%COLS))return true}return false}
function reshufflePlayable(){const rem=board.filter(c=>c.id!==0);let t=0;do{sh(rem);let p=0;board=board.map(c=>c.id===0?c:rem[p++]);t++}while(!hasMove()&&t<300)}
function resizeSvg(){const r=boardEl.getBoundingClientRect();linesEl.setAttribute('width',r.width);linesEl.setAttribute('height',r.height);linesEl.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`)}
function center(r,c){const t=boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);const b=t.getBoundingClientRect(),p=boardEl.getBoundingClientRect();return{x:b.left-p.left+b.width/2,y:b.top-p.top+b.height/2}}
function drawPath(path){clearLines();const br=boardEl.getBoundingClientRect();const pts=path.map(([rr,cc])=>{const r=rr-1,c=cc-1;if(r<0)return{x:center(0,Math.max(0,Math.min(COLS-1,c))).x,y:-4};if(r>=ROWS)return{x:center(ROWS-1,Math.max(0,Math.min(COLS-1,c))).x,y:br.height+4};if(c<0)return{x:-4,y:center(Math.max(0,Math.min(ROWS-1,r)),0).y};if(c>=COLS)return{x:br.width+4,y:center(Math.max(0,Math.min(ROWS-1,r)),COLS-1).y};return center(r,c)});const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');poly.setAttribute('points',pts.map(p=>`${p.x},${p.y}`).join(' '));poly.setAttribute('fill','none');poly.setAttribute('stroke','#ffe27b');poly.setAttribute('stroke-width','5');poly.setAttribute('stroke-linecap','round');poly.setAttribute('stroke-linejoin','round');linesEl.appendChild(poly);setTimeout(clearLines,160)}
const clearLines=()=>linesEl.innerHTML='';
const fmt=ms=>{const s=(ms/1000)|0;return String((s/60)|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0')};
document.getElementById('restart').onclick=init;
document.getElementById('shuffle').onclick=()=>{reshufflePlayable();selected=null;render()};
setInterval(()=>timeEl.textContent=fmt(Date.now()-start),250);
window.addEventListener('resize',resizeSvg);
init();
</script>
</body>
</html>
